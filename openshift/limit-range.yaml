apiVersion: v1
kind: LimitRange
metadata:
  name: netflix-clone-limitrange
  namespace: netflix-clone
spec:
  limits:
  - type: Container
    default:
      cpu: 200m
      memory: 512Mi
    defaultRequest:
      cpu: 100m
      memory: 256Mi
    max:
      cpu: 500m
      memory: 1Gi
    min:
      cpu: 50m
      memory: 128Mi
