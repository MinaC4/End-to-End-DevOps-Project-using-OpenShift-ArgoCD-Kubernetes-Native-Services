apiVersion: v1
kind: ServiceAccount
metadata:
  name: netflix-clone-sa
  namespace: netflix-clone

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: netflix-clone-anyuid
  namespace: netflix-clone
subjects:
  - kind: ServiceAccount
    name: netflix-clone-sa
roleRef:
  kind: ClusterRole
  name: system:openshift:scc:anyuid
  apiGroup: rbac.authorization.k8s.io
