spec:
  description: Netflix Clone - DevSecOps Pipeline (Build + Trivy Scan + Deploy)
  tasks:
  - name: clone-and-build
    taskRef:
      kind: Task
      name: npm-build
    workspaces:
    - name: source
      workspace: source
  - name: build-and-push-image
    params:
    - name: image
      value: image-registry.openshift-image-registry.svc:5000/netflix-clone/netflix-clone:latest
    runAfter:
    - clone-and-build
    taskRef:
      kind: Task
      name: buildah-build
    workspaces:
    - name: source
      workspace: source
  - name: trivy-image-scan
    params:
    - name: image
      value: image-registry.openshift-image-registry.svc:5000/netflix-clone/netflix-clone:latest
    - name: severity
      value: HIGH
    runAfter:
    - build-and-push-image
    taskRef:
      kind: Task
      name: trivy-image-scan
  - name: deploy-to-openshift
    params:
    - name: script
      value: |
        #!/bin/bash
        set -ex
        echo "=== Updating Deployment with new image ==="
        oc set image deployment/netflix-clone netflix-clone=image-registry.openshift-image-registry.svc:5000/netflix-clone/netflix-clone:latest -n netflix-clone

        echo "=== Restarting Deployment ==="
        oc rollout restart deployment/netflix-clone -n netflix-clone

        echo "=== Waiting for rollout to complete ==="
        oc rollout status deployment/netflix-clone -n netflix-clone --timeout=180s

