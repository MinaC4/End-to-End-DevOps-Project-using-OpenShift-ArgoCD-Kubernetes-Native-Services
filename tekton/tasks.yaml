- apiVersion: tekton.dev/v1
  kind: Task
  metadata:
    annotations:
      operator.tekton.dev/last-applied-hash: 76f2bb2db3839069c487d79722f374729b9f4495be6193bb4e9a56b3e613adc9
      tekton.dev/categories: Deployment
      tekton.dev/displayName: argocd
      tekton.dev/pipelines.minVersion: 0.12.1
      tekton.dev/platforms: linux/amd64
      tekton.dev/tags: deploy
    creationTimestamp: "2026-04-29T20:13:10Z"
    generation: 1
    labels:
      app.kubernetes.io/version: "0.2"
      operator.tekton.dev/provider-type: community
    name: argocd-task-sync-and-wait
    namespace: openshift-pipelines
    ownerReferences:
    - apiVersion: operator.tekton.dev/v1alpha1
      blockOwnerDeletion: true
      controller: true
      kind: TektonInstallerSet
      name: addon-custom-communityresolvertask-gdgl2
      uid: fb07ec47-ff04-46bf-b63f-be6df941f960
    resourceVersion: "106599"
    uid: 03940bd5-06d8-4f57-81e6-6b7405fdea9d
  spec:
    description: |-
      This task syncs (deploys) an Argo CD application and waits for it to be healthy.
      To do so, it requires the address of the Argo CD server and some form of authentication either a username/password or an authentication token.
    params:
    - description: name of the application to sync
      name: application-name
      type: string
    - default: HEAD
      description: the revision to sync to
      name: revision
      type: string
    - default: --
      name: flags
      type: string
    - default: v2.2.2
      name: argocd-version
      type: string
    stepTemplate:
      computeResources: {}
      envFrom:
      - configMapRef:
          name: argocd-env-configmap
      - secretRef:
          name: argocd-env-secret
    steps:
    - computeResources: {}
      image: quay.io/argoproj/argocd:$(params.argocd-version)
      name: login
      script: |
        if [ -z "$ARGOCD_AUTH_TOKEN" ]; then
          yes | argocd login "$ARGOCD_SERVER" --username="$ARGOCD_USERNAME" --password="$ARGOCD_PASSWORD";
        fi
        argocd app sync "$(params.application-name)" --revision "$(params.revision)" "$(params.flags)"
        argocd app wait "$(params.application-name)" --health "$(params.flags)"
