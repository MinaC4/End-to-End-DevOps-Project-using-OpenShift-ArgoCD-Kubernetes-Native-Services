- apiVersion: tekton.dev/v1
  kind: Task
  metadata:
    annotations:
      kubectl.kubernetes.io/last-applied-configuration: |
        {"apiVersion":"tekton.dev/v1","kind":"Task","metadata":{"annotations":{},"name":"buildah-build","namespace":"openshift-pipelines"},"spec":{"params":[{"default":"image-registry.openshift-image-registry.svc:5000/netflix-clone/netflix-clone:latest","description":"Full image name to build and push","name":"image"}],"steps":[{"image":"quay.io/buildah/stable:v1.35","name":"build-and-push","script":"#!/bin/bash\nset -ex\necho \"=== Building Docker image ===\"\n\n# حل مشكلة short-name resolution\nbuildah bud \\\n  --storage-driver=vfs \\\n  --pull-always \\\n  -f Dockerfile \\\n  -t $(params.image) .\n\necho \"=== Pushing image to internal registry ===\"\nbuildah push --storage-driver=vfs $(params.image)\n\necho \"=== Image built and pushed successfully: $(params.image) ===\"\n","securityContext":{"privileged":true},"workingDir":"$(workspaces.source.path)"}],"workspaces":[{"name":"source"}]}}
    creationTimestamp: "2026-04-29T20:14:31Z"
    generation: 2
    name: buildah-build
    namespace: openshift-pipelines
    resourceVersion: "121924"
    uid: bd0c7e99-675c-4963-a5d4-c49ecdbe5ed3
  spec:
    params:
    - default: image-registry.openshift-image-registry.svc:5000/netflix-clone/netflix-clone:latest
      description: Full image name to build and push
      name: image
      type: string
    steps:
    - computeResources: {}
      image: quay.io/buildah/stable:v1.35
      name: build-and-push
      script: |
        #!/bin/bash
        set -ex
        echo "=== Building Docker image ==="

        # حل مشكلة short-name resolution
        buildah bud \
          --storage-driver=vfs \
          --pull-always \
          -f Dockerfile \
          -t $(params.image) .

        echo "=== Pushing image to internal registry ==="
        buildah push --storage-driver=vfs $(params.image)

        echo "=== Image built and pushed successfully: $(params.image) ==="
      securityContext:
        privileged: true
      workingDir: $(workspaces.source.path)
    workspaces:
    - name: source
