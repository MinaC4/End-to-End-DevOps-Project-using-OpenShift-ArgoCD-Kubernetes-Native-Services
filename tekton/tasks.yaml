  spec:
    description: |2

      Buildah task builds source into a container image and
      then pushes it to a container registry. This task runs with
      user namespace isolation for enhanced security, providing
      better isolation and reduced privileges during the build process.
    params:
    - description: |
        Fully qualified container image name to be built by buildah.
      name: IMAGE
      type: string
    - default: ./Dockerfile
      description: |
        Path to the `Dockerfile` (or `Containerfile`) relative to the `source` workspace.
      name: DOCKERFILE
      type: string
    - default:
      - ""
      description: |
        Dockerfile build arguments, array of key=value
      name: BUILD_ARGS
      type: array
    - default: .
      description: |
        Path to the directory to use as context.
      name: CONTEXT
      type: string
    - default: vfs
      description: |
        Set buildah storage driver to reflect the currrent cluster node's
        settings.
      name: STORAGE_DRIVER
      type: string
    - default: oci
      description: The format of the built container, oci or docker
      name: FORMAT
      type: string
    - default: ""
      description: |
        Extra parameters passed for the build command when building images.
      name: BUILD_EXTRA_ARGS
      type: string
    - default: ""
      description: |
        Extra parameters passed for the push command when pushing images.
      name: PUSH_EXTRA_ARGS
      type: string
    - default: "false"
      description: |
        Skip pushing the image to the container registry.
      name: SKIP_PUSH
      type: string
    - default: "true"
      description: |
        Sets the TLS verification flag, `true` is recommended.
      name: TLS_VERIFY
      type: string
    - default: "false"
      description: |
        Turns on verbose logging, all commands executed will be printed out.
      name: VERBOSE
      type: string
